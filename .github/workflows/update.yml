name: Daily FOREX_QUANT Update

on:
  schedule:
    # 02:00, 08:00, 14:00, 20:00 UTC — weekdays only
    - cron: '0 2,8,14,20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run engine
        run: python engine.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add multi_data.json index.html
          if git diff --cached --quiet; then
            echo "::notice::No data change — skipping commit."
          else
            git commit -m "auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Prepare deploy folder
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp .nojekyll _site/.nojekyll 2>/dev/null || touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload only index.html to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1200000
